name: db-migration

# - On PRs: only build & test (no DB touched).
# - Migrations run ONLY when you click "Run workflow" and pick a tenant.
#
# Tenants are read from the MASTER database (tenant_registry). The runner must
# be able to reach the master DB AND every tenant DB it points to.
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tenants:
        description: "Which tenant(s) to migrate"
        type: choice
        options: [all, tenant_a, tenant_b, tenant_c]
        default: all
      command:
        description: "Liquibase command to run"
        type: choice
        options: [update, status, validate, rollback]
        default: update
      count:
        description: "Rollback count (only used when command=rollback)"
        type: string
        default: "1"
      dry_run:
        description: "Print SQL without applying (update only)"
        type: boolean
        default: false

jobs:
  # Always runs: compiles + tests. Gate for merging PRs.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build & test
        run: mvn -B clean verify

  # Runs ONLY on a manual "Run workflow" — with the tenant YOU selected.
  migrate:
    needs: build-test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production         # optional manual-approval gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        run: mvn -B -q clean package -DskipTests

      - name: Run migration on selected tenant(s)
        env:
          # ONLY the master DB connection is needed now. Tenant urls/users/
          # passwords come from the tenant_registry table in this master DB.
          MASTER_DB_URL: ${{ secrets.MASTER_DB_URL }}
          MASTER_DB_USERNAME: ${{ secrets.MASTER_DB_USERNAME }}
          MASTER_DB_PASSWORD: ${{ secrets.MASTER_DB_PASSWORD }}
          MIGRATION_CONTEXTS: prod
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          java -jar target/db-migration-service.jar \
            --tenants='${{ inputs.tenants }}' \
            --command='${{ inputs.command }}' \
            --count='${{ inputs.count }}'

  # Always reports the result (wire to Slack/Teams in real use).
  notify:
    needs: migrate
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: echo "Migration result = ${{ needs.migrate.result }}"
