name: db-migration

# - On PRs: only build & test (no DB touched).
# - Migrations run ONLY when you click "Run workflow" and pick a tenant.
#
# DEMO MODE: the migrate job below spins up a throwaway PostgreSQL inside the
# CI runner (a "service container") and migrates that. This lets the pipeline
# go GREEN with no external databases or secrets. To migrate REAL tenants,
# remove the `services:` block + the "Create tenant databases" step, and feed
# the TENANT_*_DB_* values from GitHub Secrets instead (see README).
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tenants:
        description: "Target tenants: 'all' or comma-separated, e.g. tenant_a,tenant_c"
        type: string
        default: all
      command:
        description: "Liquibase command to run"
        type: choice
        options: [update, status, validate, rollback]
        default: update
      count:
        description: "Rollback count (only used when command=rollback)"
        type: string
        default: "1"
      dry_run:
        description: "Print SQL without applying (update only)"
        type: boolean
        default: false

jobs:
  # Always runs: compiles + tests. Gate for merging PRs.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build & test
        run: mvn -B clean verify

  # Runs ONLY on a manual "Run workflow" — with the tenant YOU selected.
  migrate:
    needs: build-test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    # DEMO: a temporary Postgres available at localhost:5432 during this job.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Create tenant databases (CI demo only)
        env:
          PGPASSWORD: postgres
        run: |
          for db in tenant_a_db tenant_b_db tenant_c_db; do
            psql -h localhost -U postgres -c "CREATE DATABASE $db;"
          done

      - name: Build jar
        run: mvn -B -q clean package -DskipTests

      - name: Run migration on selected tenant(s)
        env:
          # DEMO: point every tenant at the CI Postgres service.
          # For real tenants, replace these with ${{ secrets.TENANT_*_DB_* }}.
          TENANT_A_DB_URL: jdbc:postgresql://localhost:5432/tenant_a_db
          TENANT_A_DB_USERNAME: postgres
          TENANT_A_DB_PASSWORD: postgres
          TENANT_B_DB_URL: jdbc:postgresql://localhost:5432/tenant_b_db
          TENANT_B_DB_USERNAME: postgres
          TENANT_B_DB_PASSWORD: postgres
          TENANT_C_DB_URL: jdbc:postgresql://localhost:5432/tenant_c_db
          TENANT_C_DB_USERNAME: postgres
          TENANT_C_DB_PASSWORD: postgres
          LIQUIBASE_CONTEXTS: prod
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          java -jar target/db-migration-service.jar \
            --tenants='${{ inputs.tenants }}' \
            --command='${{ inputs.command }}' \
            --count='${{ inputs.count }}'

  # Always reports the result (wire to Slack/Teams in real use).
  notify:
    needs: migrate
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: echo "Migration result = ${{ needs.migrate.result }}"
