# =====================================================================
# db-migration-service configuration
# Tenants are read DYNAMICALLY from the MASTER database's tenant_registry table.
# Only the MASTER connection comes from here (env-var driven).
# =====================================================================

spring:
  main:
    web-application-type: none     # batch job, not a web server
    banner-mode: "off"

  # --- MASTER database (holds the tenant_registry table) ---
  datasource:
    url: ${MASTER_DB_URL:jdbc:postgresql://localhost:5433/master_db}
    username: ${MASTER_DB_USERNAME:postgres}
    password: ${MASTER_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: master-pool
      maximum-pool-size: 2

  jpa:
    hibernate:
      ddl-auto: none               # never let Hibernate alter the master schema
    open-in-view: false

  liquibase:
    enabled: false                 # we run Liquibase ourselves, per tenant

# --- our own settings (bound to MigrationProperties) ---
migration:
  changelog-master: db/changelog/master.xml
  contexts: ${MIGRATION_CONTEXTS:}
  labels: ${MIGRATION_LABELS:}
  dry-run: ${DRY_RUN:false}
  continue-on-error: ${CONTINUE_ON_ERROR:true}
  retry:
    max-attempts: 3
    initial-delay-ms: 2000

logging:
  level:
    root: INFO
    com.eden.dbmigration: INFO
    liquibase: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{tenantId:-startup}] %logger{36} - %msg%n"
